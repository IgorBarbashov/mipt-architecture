version: "3.9"

services:
  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8001:8000"
    env_file:
      - .env

  message-service:
    build: ./message-service
    container_name: message-service
    ports:
      - "8002:8000"
    env_file:
      - .env
    depends_on:
      - auth-service